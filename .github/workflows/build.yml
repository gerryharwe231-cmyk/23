name: Build 0.9.18 Connected Model Sweep

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - fix/0.9.18-connected-model-sweep

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3
      - name: Locate project
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$GITHUB_WORKSPACE"
          if [[ ! -f "$PROJECT_DIR/build.gradle" ]]; then
            CANDIDATE=$(find "$GITHUB_WORKSPACE" -maxdepth 8 -type f -name build.gradle -print -quit || true)
            if [[ -z "$CANDIDATE" ]]; then
              ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name '*.zip' -print -quit || true)
              [[ -n "$ZIP_FILE" ]] || { echo 'No Gradle project found'; exit 1; }
              DEST="$RUNNER_TEMP/source"
              mkdir -p "$DEST"
              unzip -q -o "$ZIP_FILE" -d "$DEST"
              CANDIDATE=$(find "$DEST" -maxdepth 8 -type f -name build.gradle -print -quit || true)
            fi
            [[ -n "$CANDIDATE" ]] || { echo 'No build.gradle found'; exit 1; }
            PROJECT_DIR=$(dirname "$CANDIDATE")
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
      - name: Source regression checks
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ steps.locate.outputs.project_dir }}"
          grep -q 'MATERIAL_BAKED_MODEL' "$PROJECT/src/main/java/com/slopeconnector/hotfix/SourceProfile.java"
          grep -q 'getVertexData' "$PROJECT/src/main/java/com/slopeconnector/hotfix/client/ArcRibbonRenderer.java"
          grep -q 'MODEL_CONNECTED' "$PROJECT/src/main/java/com/slopeconnector/hotfix/ArcRibbonGenerator.java"
      - name: Build
        run: gradle -p "${{ steps.locate.outputs.project_dir }}" --no-daemon --console=plain clean build
      - uses: actions/upload-artifact@v4
        with:
          name: slope-connector-0.9.18-connected-model-sweep
          path: ${{ steps.locate.outputs.project_dir }}/build/libs/*.jar
          if-no-files-found: error
