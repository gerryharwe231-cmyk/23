name: Build Slope Connector

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3
      - name: Locate project
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$GITHUB_WORKSPACE"
          if [[ ! -f "$PROJECT_DIR/build.gradle" ]]; then
            CANDIDATE=$(find "$GITHUB_WORKSPACE" -maxdepth 8 -type f -name build.gradle -print -quit || true)
            if [[ -z "$CANDIDATE" ]]; then
              ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name '*.zip' -print -quit || true)
              [[ -n "$ZIP_FILE" ]] || { echo 'No Gradle project found'; exit 1; }
              DEST="$RUNNER_TEMP/source"
              mkdir -p "$DEST"
              unzip -q -o "$ZIP_FILE" -d "$DEST"
              CANDIDATE=$(find "$DEST" -maxdepth 8 -type f -name build.gradle -print -quit || true)
            fi
            [[ -n "$CANDIDATE" ]] || { echo 'No build.gradle found'; exit 1; }
            PROJECT_DIR=$(dirname "$CANDIDATE")
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
      - name: Build
        run: gradle -p "${{ steps.locate.outputs.project_dir }}" --no-daemon --console=plain clean build
      - name: Package complete source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_ARCHIVE="$RUNNER_TEMP/slope_connector_realmesh_0.9.18_connected_model_sweep_FLAT_GITHUB.zip"
          python3 - "${{ steps.locate.outputs.project_dir }}" "$GITHUB_WORKSPACE" "$SOURCE_ARCHIVE" <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          import sys

          project = Path(sys.argv[1]).resolve()
          repository = Path(sys.argv[2]).resolve()
          output = Path(sys.argv[3]).resolve()
          excluded = {'.git', '.gradle', 'build'}
          written = set()

          def add_tree(archive, root, archive_root=None):
              for path in sorted(root.rglob('*')):
                  if not path.is_file():
                      continue
                  relative = path.relative_to(root)
                  if any(part in excluded for part in relative.parts):
                      continue
                  target = relative if archive_root is None else archive_root / relative
                  name = target.as_posix()
                  if name in written:
                      continue
                  archive.write(path, name)
                  written.add(name)

          with ZipFile(output, 'w', ZIP_DEFLATED) as archive:
              add_tree(archive, project)
              workflow_root = repository / '.github'
              if workflow_root.is_dir() and not (project / '.github').is_dir():
                  add_tree(archive, workflow_root, Path('.github'))
          PY
          echo "archive=$SOURCE_ARCHIVE" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: slope-connector-build
          path: ${{ steps.locate.outputs.project_dir }}/build/libs/*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: slope-connector-0.9.18-complete-source
          path: ${{ steps.source.outputs.archive }}
          if-no-files-found: error
